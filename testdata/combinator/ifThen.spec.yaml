content:
  - name: _ifThen scalar dispatch
    expression: "_ifThen: [[boolean, boolean], [int, int]]"
    content:
      - name: accept first matching test
        text:
          - "false"
          - "true"
      - name: accept later matching test
        text:
          - "-1"
          - "0"
          - "42"
      - name: reject when no test matches
        errorContains: "_ifThen"
        text:
          - "0.1"
          - "value"
          - "[]"
          - "{}"
  - name: _ifThen uses matched then expression
    expression: '_ifThen: [[string, { _regex: "^[a-z]+$" }], [any, int]]'
    content:
      - name: accept matching string branch
        text:
          - "alpha"
      - name: reject when selected then branch fails
        errorContains: "_regex"
        text:
          - "Alpha"
      - name: accept default branch
        text:
          - "1"
          - "2"
